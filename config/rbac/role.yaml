apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cocoon-webhook
  labels:
    app.kubernetes.io/name: cocoon-webhook
rules:
  # Scale-down validation needs to fetch the parent Deployment /
  # StatefulSet on /scale subresource UPDATEs because the Scale
  # object passed to the webhook does not carry the pod template
  # tolerations the cocoon filter relies on.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get"]
  # CocoonHibernation CREATE validation lists existing CRs in the namespace
  # to enforce one live CR per pod.
  - apiGroups: ["cocoonset.cocoonstack.io"]
    resources: ["cocoonhibernations"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cocoon-webhook
  labels:
    app.kubernetes.io/name: cocoon-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cocoon-webhook
subjects:
  - kind: ServiceAccount
    name: cocoon-webhook
    namespace: cocoon-system
