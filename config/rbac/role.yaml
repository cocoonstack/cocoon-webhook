apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cocoon-webhook
  labels:
    app.kubernetes.io/name: cocoon-webhook
rules:
  # Pods are listed by the LeastUsedPicker (per node) and probed by
  # the Reaper (per namespace) to detect orphan reservations.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Nodes are listed by the LeastUsedPicker, scoped by the
  # cocoonstack.io/pool label.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # The webhook owns one ConfigMap per cocoon node pool in
  # cocoon-system; create / update / delete are needed for the
  # ConfigMapStore + Reaper interaction.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cocoon-webhook
  labels:
    app.kubernetes.io/name: cocoon-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cocoon-webhook
subjects:
  - kind: ServiceAccount
    name: cocoon-webhook
    namespace: cocoon-system
